# XploitVerse Development Stack
# Usage: docker compose up -d
# Then run the Express server and Vite dev server locally,
# or use the 'api' service below for full containerized mode.

services:
  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: xv-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: xploitverse
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - backend

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xv-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - backend

  # ── Express API Server (optional — for full containerized mode) ─
  # Uncomment to run the API server in Docker instead of locally.
  # api:
  #   build:
  #     context: ./server
  #     dockerfile: Dockerfile
  #   container_name: xv-api
  #   restart: unless-stopped
  #   ports:
  #     - '5000:5000'
  #   env_file:
  #     - ./server/.env
  #   depends_on:
  #     mongo:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #         cpus: '1.0'
  #   networks:
  #     - backend

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  backend:
    driver: bridge

# ── Lab Network (created separately by DockerService) ────────────
# The xploitverse-labs network (172.30.0.0/16) is created by the
# Express backend's DockerService at startup.
# Lab containers are attached to that network, NOT this compose stack.

